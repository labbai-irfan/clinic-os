name: Dependency review

# Supply-chain gate (Phase 10 · Part 9). On every PR, diffs the dependency
# manifest and BLOCKS the merge if a new dependency carries a known
# vulnerability (>= moderate) or a disallowed license. This is the
# preventative complement to Dependabot (which fixes what already landed).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write # post the summary comment

jobs:
  review:
    name: Review new dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # Copyleft licenses need explicit sign-off for a proprietary product.
          deny-licenses: AGPL-3.0, GPL-3.0, LGPL-3.0
