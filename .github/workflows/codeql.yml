name: CodeQL

# Static security analysis (Phase 10 · Part 9). Scans the TypeScript/JavaScript
# for injection, XSS, prototype-pollution, unsafe-DOM, and other CWE classes, and
# surfaces findings in the repo's Security tab. Runs on every push to main, every
# PR, and weekly (to catch newly-published query updates against unchanged code).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 4 * * 1' # Mondays 04:37 UTC

# Cancel superseded runs on the same ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none # JS/TS needs no compiled build for analysis
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
