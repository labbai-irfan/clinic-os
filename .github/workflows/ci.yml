name: CI

# Runs the full quality gate on every push to main and every pull request.
# Mirrors the local gate so "all gates green" is true in CI, not just on a laptop.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: '0' # don't install git hooks in CI

jobs:
  verify:
    name: Verify (lint · types · format · test · build · registries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint (incl. import + circular-dependency validation)
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Architecture validation
        run: pnpm run validate:arch

      - name: Duplication gate
        run: pnpm run check:duplicates

      - name: Design-token compliance
        run: pnpm run check:tokens

      - name: Localization validation
        run: pnpm run check:i18n

      - name: Unit + a11y tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Performance budget
        run: pnpm run check:perf

      - name: Component registry validation
        run: pnpm run ds:registry

      - name: Asset hygiene
        run: pnpm run check:assets

      - name: Documentation validation
        run: pnpm run validate:docs

      - name: Brain validation
        run: pnpm run validate:brain

      - name: Upload build artifact (deploy source / inspection)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm run e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
